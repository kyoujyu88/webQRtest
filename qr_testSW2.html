<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharePoint通信テスト</title>
    
    <script src="sweetalert2.all.min.js"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; padding: 30px; }
        .test-box { max-width: 400px; margin: 0 auto; padding: 20px; border: 2px dashed #ccc; border-radius: 10px; }
        input[type="text"] { font-size: 1.2em; padding: 10px; width: 80%; margin-bottom: 20px; text-align: center; }
        button.submit-btn { font-size: 1.2em; padding: 10px 30px; background-color: #0078D4; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button.submit-btn:hover { background-color: #005A9E; }
        
        .toggle-area { margin: 20px 0; }
        .toggle-area label { padding: 10px 20px; font-size: 1.2em; border: 2px solid #ccc; border-radius: 10px; cursor: pointer; margin: 0 5px; }
        input[type="radio"]:checked + label { background-color: #4CAF50; color: white; border-color: #4CAF50; }
        input[type="radio"] { display: none; }
    </style>
</head>
<body>

    <h2>リスト書き込みテスト</h2>
    
    <div class="test-box">
        <input type="text" id="input-name" placeholder="お名前を入力 (例: Atsushi)">
        
        <div class="toggle-area">
            <input type="radio" id="type-in" name="attendance_type" value="出勤" checked>
            <label for="type-in">出勤</label>
            
            <input type="radio" id="type-out" name="attendance_type" value="退勤">
            <label for="type-out">退勤</label>
        </div>

        <button class="submit-btn" onclick="runTest()">テスト送信する</button>
    </div>

    <script>
        // --- ★設定エリア（ここだけ書き換えてください！）★ ---
        const SITE_URL = "https://あなたのテナント名.sharepoint.com/sites/サイト名"; 
        const LIST_NAME = "QR打刻記録"; 
        // ----------------------------------------------------

        // SharePointに書き込む関数（前回と全く同じものです）
        async function saveToSharePoint(name, type, timeStr) {
            try {
                const contextResponse = await fetch(SITE_URL + "/_api/contextinfo", {
                    method: "POST",
                    headers: { "Accept": "application/json; odata=nometadata" }
                });
                const contextData = await contextResponse.json();
                const formDigestValue = contextData.FormDigestValue;

                const itemData = {
                    "Title": name,
                    "AttendanceType": type,
                    "TimeRecord": timeStr
                };

                const addResponse = await fetch(SITE_URL + "/_api/web/lists/getbytitle('" + LIST_NAME + "')/items", {
                    method: "POST",
                    headers: {
                        "Accept": "application/json; odata=nometadata",
                        "Content-Type": "application/json; odata=nometadata",
                        "X-RequestDigest": formDigestValue
                    },
                    body: JSON.stringify(itemData)
                });

                return addResponse.ok;
            } catch (error) {
                console.error("通信エラー:", error);
                return false;
            }
        }

        // ボタンを押した時の処理です
        async function runTest() {
            let nameInput = document.getElementById('input-name').value;
            if (nameInput === "") {
                Swal.fire('お願い', 'お名前を入力してくださいっ', 'warning');
                return;
            }

            let selectedType = document.querySelector('input[name="attendance_type"]:checked').value;
            
            let now = new Date();
            let timeString = now.getFullYear() + "/" + 
                             (now.getMonth() + 1).toString().padStart(2, '0') + "/" + 
                             now.getDate().toString().padStart(2, '0') + " " +
                             now.getHours().toString().padStart(2, '0') + ":" + 
                             now.getMinutes().toString().padStart(2, '0');

            Swal.fire({
                title: '通信中...',
                text: 'SharePointにお手紙を送っていますっ',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            // 書き込みを実行します！
            let isSuccess = await saveToSharePoint(nameInput, selectedType, timeString);

            if (isSuccess) {
                Swal.fire('大成功です！', nameInput + 'さんのデータをリストに追加しました！', 'success');
                document.getElementById('input-name').value = ""; // 成功したら名前を空っぽにします
            } else {
                Swal.fire('エラー', 'リストに書き込めませんでした……。F12キーを押してコンソールの赤い文字を確認してみてください。', 'error');
            }
        }
    </script>

</body>
</html>
